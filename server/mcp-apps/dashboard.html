<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TORQUE Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, system-ui, 'Segoe UI', sans-serif; font-size: 13px; overflow: hidden; }

  /* Tab bar */
  #tabs { display: flex; border-bottom: 1px solid #30363d; background: #161b22; position: relative; }
  .tab-btn { flex: 1; padding: 8px 4px; text-align: center; cursor: pointer; border: none; background: none; color: #8b949e; font-size: 12px; font-weight: 500; font-family: inherit; transition: color 0.15s, border-color 0.15s; border-bottom: 2px solid transparent; }
  .tab-btn:hover { color: #e6edf3; }
  .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }

  /* Refresh indicator */
  #refresh-indicator { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%; background: transparent; transition: background 0.2s; }
  #refresh-indicator.loading { background: #58a6ff; animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Tab content */
  .tab-content { display: none; height: 310px; overflow-y: auto; padding: 10px; }
  .tab-content.active { display: block; }
  .tab-content::-webkit-scrollbar { width: 5px; }
  .tab-content::-webkit-scrollbar-track { background: #0d1117; }
  .tab-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  /* Stat row */
  .stat-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .stat-box { flex: 1; text-align: center; padding: 6px 4px; background: #161b22; border-radius: 6px; border: 1px solid #30363d; }
  .stat-num { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
  .c-green { color: #4ade80; }
  .c-yellow { color: #fbbf24; }
  .c-blue { color: #60a5fa; }
  .c-red { color: #f87171; }

  /* Badge */
  .badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge-green { background: #0f291a; color: #4ade80; border: 1px solid #1a3a2a; }
  .badge-yellow { background: #2d2305; color: #fbbf24; border: 1px solid #3d3310; }
  .badge-red { background: #2d0f0f; color: #f87171; border: 1px solid #3d1a1a; }
  .badge-blue { background: #0f1d2d; color: #60a5fa; border: 1px solid #1a2d3d; }
  .badge-gray { background: #1c1c1c; color: #8b949e; border: 1px solid #30363d; }

  /* Pressure row */
  .pressure-row { margin-bottom: 10px; font-size: 11px; color: #8b949e; }

  /* Task list */
  .task-row { display: flex; align-items: center; gap: 6px; padding: 5px 6px; background: #161b22; border-radius: 4px; margin-bottom: 4px; border: 1px solid #21262d; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-running { background: #4ade80; box-shadow: 0 0 4px #4ade8066; }
  .dot-queued { background: #fbbf24; }
  .dot-completed { background: #60a5fa; }
  .dot-failed { background: #f87171; }
  .dot-cancelled { background: #8b949e; }
  .task-id { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; color: #8b949e; width: 52px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-provider { font-size: 11px; color: #58a6ff; width: 70px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-progress { width: 48px; flex-shrink: 0; }
  .progress-bar { height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #58a6ff; border-radius: 2px; transition: width 0.3s; }
  .task-desc { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: #c9d1d9; }
  .task-pct { font-size: 10px; color: #8b949e; width: 28px; text-align: right; flex-shrink: 0; }

  /* Provider grid */
  .provider-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .host-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px; }
  .host-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .host-name { font-weight: 600; font-size: 12px; }
  .host-status { font-size: 13px; }
  .host-meta { font-size: 11px; color: #8b949e; line-height: 1.6; }

  /* Workflow */
  .wf-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .wf-name { font-weight: 600; font-size: 14px; }
  .wf-progress { margin-bottom: 12px; }
  .wf-bar-track { height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; }
  .wf-bar-fill { height: 100%; background: #58a6ff; border-radius: 4px; transition: width 0.3s; }
  .wf-bar-label { font-size: 11px; color: #8b949e; margin-top: 3px; }
  .wf-node { display: flex; align-items: center; gap: 8px; padding: 5px 6px; background: #161b22; border-radius: 4px; margin-bottom: 4px; border: 1px solid #21262d; font-size: 12px; }
  .wf-node-id { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; color: #c9d1d9; width: 80px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wf-node-provider { color: #58a6ff; font-size: 11px; flex: 1; }

  /* Cost */
  .cost-total { text-align: center; padding: 12px 0 10px; }
  .cost-amount { font-size: 28px; font-weight: 700; color: #e6edf3; }
  .cost-label { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .budget-section { margin: 10px 0; }
  .budget-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .budget-bar-track { height: 10px; background: #21262d; border-radius: 5px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 5px; transition: width 0.3s, background 0.3s; }
  .cost-breakdown { margin-top: 12px; }
  .cost-row { display: flex; justify-content: space-between; padding: 4px 6px; font-size: 12px; background: #161b22; border-radius: 4px; margin-bottom: 3px; border: 1px solid #21262d; }
  .cost-provider { color: #58a6ff; }
  .cost-value { color: #e6edf3; font-variant-numeric: tabular-nums; }

  /* Error + empty states */
  .error-state, .empty-state { text-align: center; padding: 40px 20px; color: #8b949e; }
  .error-state { color: #f87171; }
  .retry-btn { margin-top: 10px; padding: 5px 14px; background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .retry-btn:hover { background: #30363d; }
  .section-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
</style>
</head>
<body>
<div id="app">
  <nav id="tabs">
    <button class="tab-btn active" data-tab="tasks">Tasks</button>
    <button class="tab-btn" data-tab="providers">Providers</button>
    <button class="tab-btn" data-tab="workflow">Workflow</button>
    <button class="tab-btn" data-tab="cost">Cost</button>
    <span id="refresh-indicator"></span>
  </nav>
  <div id="tab-tasks" class="tab-content active"></div>
  <div id="tab-providers" class="tab-content"></div>
  <div id="tab-workflow" class="tab-content"></div>
  <div id="tab-cost" class="tab-content"></div>
</div>
<script>
(function() {
  'use strict';

  var activeTab = 'tasks';
  var cache = {};
  var refreshTimer = null;

  // --- MCP Tool Calling via postMessage ---
  function callTool(name, args) {
    if (args === undefined) args = {};
    return new Promise(function(resolve, reject) {
      var id = 'req-' + Date.now() + '-' + Math.random().toString(36).slice(2);
      var timeout = setTimeout(function() {
        window.removeEventListener('message', handler);
        reject(new Error('Timeout'));
      }, 15000);
      function handler(event) {
        if (event.data && event.data.id === id) {
          clearTimeout(timeout);
          window.removeEventListener('message', handler);
          resolve(event.data.result);
        }
      }
      window.addEventListener('message', handler);
      window.parent.postMessage({
        jsonrpc: '2.0', id: id,
        method: 'tools/call',
        params: { name: name, arguments: args }
      }, '*');
    });
  }

  // --- Helpers ---
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = String(s || '');
    return d.innerHTML;
  }

  function truncId(id) { return id ? id.slice(0, 8) : '\u2014'; }

  function statusDotClass(s) {
    if (s === 'running') return 'dot-running';
    if (s === 'queued' || s === 'pending') return 'dot-queued';
    if (s === 'completed' || s === 'done') return 'dot-completed';
    if (s === 'failed' || s === 'error') return 'dot-failed';
    return 'dot-cancelled';
  }

  function pressureBadgeHtml(level) {
    if (!level) return '';
    var cls = 'badge-green';
    if (level === 'moderate' || level === 'elevated') cls = 'badge-yellow';
    if (level === 'high' || level === 'critical') cls = 'badge-red';
    return '<span class="badge ' + cls + '">' + esc(level) + '</span>';
  }

  function budgetColor(pct) {
    if (pct < 60) return '#4ade80';
    if (pct < 85) return '#fbbf24';
    return '#f87171';
  }

  function statusBadgeHtml(s) {
    var cls = 'badge-gray';
    if (s === 'running' || s === 'active') cls = 'badge-green';
    if (s === 'completed' || s === 'done') cls = 'badge-blue';
    if (s === 'failed') cls = 'badge-red';
    if (s === 'queued' || s === 'pending') cls = 'badge-yellow';
    return '<span class="badge ' + cls + '">' + esc(s || 'unknown') + '</span>';
  }

  function showError(el, msg, retryFn) {
    // Build error UI using DOM methods to avoid raw HTML injection
    el.textContent = '';
    var wrapper = document.createElement('div');
    wrapper.className = 'error-state';
    wrapper.appendChild(document.createTextNode(msg));
    wrapper.appendChild(document.createElement('br'));
    var btn = document.createElement('button');
    btn.className = 'retry-btn';
    btn.textContent = 'Retry';
    btn.addEventListener('click', retryFn);
    wrapper.appendChild(btn);
    el.appendChild(wrapper);
  }

  function showEmpty(el, msg) {
    el.textContent = '';
    var wrapper = document.createElement('div');
    wrapper.className = 'empty-state';
    wrapper.textContent = msg;
    el.appendChild(wrapper);
  }

  function extractData(result) {
    if (!result) return null;
    if (result.structuredContent) return result.structuredContent;
    if (result.content && result.content.length) {
      for (var i = 0; i < result.content.length; i++) {
        if (result.content[i].type === 'text') {
          try { return JSON.parse(result.content[i].text); } catch(e) { /* ignore */ }
        }
      }
    }
    return null;
  }

  function setLoading(on) {
    var el = document.getElementById('refresh-indicator');
    if (on) el.classList.add('loading');
    else el.classList.remove('loading');
  }

  // --- DOM-based rendering helpers ---

  function createStatBox(num, label, colorClass) {
    var box = document.createElement('div');
    box.className = 'stat-box';
    var numEl = document.createElement('div');
    numEl.className = 'stat-num ' + colorClass;
    numEl.textContent = String(num);
    var labelEl = document.createElement('div');
    labelEl.className = 'stat-label';
    labelEl.textContent = label;
    box.appendChild(numEl);
    box.appendChild(labelEl);
    return box;
  }

  function createTaskRow(t) {
    var status = t.status || 'unknown';
    var pct = t.progress != null ? Math.round(t.progress) : (status === 'completed' ? 100 : 0);

    var row = document.createElement('div');
    row.className = 'task-row';

    var dot = document.createElement('span');
    dot.className = 'status-dot ' + statusDotClass(status);
    row.appendChild(dot);

    var idEl = document.createElement('span');
    idEl.className = 'task-id';
    idEl.textContent = truncId(t.id || t.task_id);
    row.appendChild(idEl);

    var provEl = document.createElement('span');
    provEl.className = 'task-provider';
    provEl.textContent = t.provider || '\u2014';
    row.appendChild(provEl);

    var progWrap = document.createElement('span');
    progWrap.className = 'task-progress';
    var barTrack = document.createElement('div');
    barTrack.className = 'progress-bar';
    var barFill = document.createElement('div');
    barFill.className = 'progress-fill';
    barFill.style.width = pct + '%';
    barTrack.appendChild(barFill);
    progWrap.appendChild(barTrack);
    row.appendChild(progWrap);

    var pctEl = document.createElement('span');
    pctEl.className = 'task-pct';
    pctEl.textContent = pct + '%';
    row.appendChild(pctEl);

    var descEl = document.createElement('span');
    descEl.className = 'task-desc';
    descEl.textContent = t.description || t.desc || '';
    row.appendChild(descEl);

    return row;
  }

  function createSectionLabel(text) {
    var el = document.createElement('div');
    el.className = 'section-label';
    el.textContent = text;
    return el;
  }

  // --- Tab Loaders ---

  function loadTasks() {
    var el = document.getElementById('tab-tasks');
    setLoading(true);
    callTool('check_status').then(function(result) {
      setLoading(false);
      var data = extractData(result);
      if (!data) { showEmpty(el, 'No task data available'); return; }
      cache.tasks = data;

      el.textContent = '';

      var running = data.running_count || 0;
      var queued = data.queued_count || 0;
      var completed = data.completed_count || 0;
      var failed = data.failed_count || 0;

      // Stat row
      var statRow = document.createElement('div');
      statRow.className = 'stat-row';
      statRow.appendChild(createStatBox(running, 'Running', 'c-green'));
      statRow.appendChild(createStatBox(queued, 'Queued', 'c-yellow'));
      statRow.appendChild(createStatBox(completed, 'Done', 'c-blue'));
      statRow.appendChild(createStatBox(failed, 'Failed', 'c-red'));
      el.appendChild(statRow);

      // Pressure level
      if (data.pressure_level) {
        var pressRow = document.createElement('div');
        pressRow.className = 'pressure-row';
        pressRow.appendChild(document.createTextNode('Pressure: '));
        var badgeSpan = document.createElement('span');
        var cls = 'badge badge-green';
        if (data.pressure_level === 'moderate' || data.pressure_level === 'elevated') cls = 'badge badge-yellow';
        if (data.pressure_level === 'high' || data.pressure_level === 'critical') cls = 'badge badge-red';
        badgeSpan.className = cls;
        badgeSpan.textContent = data.pressure_level;
        pressRow.appendChild(badgeSpan);
        el.appendChild(pressRow);
      }

      // Task list
      var tasks = [].concat(data.running_tasks || [], data.queued_tasks || [], data.recent_tasks || []);
      if (tasks.length === 0) {
        showEmpty(el, 'No tasks');
        // Re-add stat row above empty message
        el.insertBefore(statRow, el.firstChild);
      } else {
        el.appendChild(createSectionLabel('Task List'));
        for (var i = 0; i < tasks.length; i++) {
          el.appendChild(createTaskRow(tasks[i]));
        }
      }
    }).catch(function(err) {
      setLoading(false);
      showError(el, 'Unable to load tasks: ' + err.message, loadTasks);
    });
  }

  function loadProviders() {
    var el = document.getElementById('tab-providers');
    setLoading(true);
    callTool('list_ollama_hosts').then(function(result) {
      setLoading(false);
      var data = extractData(result);
      if (!data) { showEmpty(el, 'No provider data available'); return; }
      cache.providers = data;

      var hosts = data.hosts || [];
      if (hosts.length === 0) { showEmpty(el, 'No hosts configured'); return; }

      el.textContent = '';
      var grid = document.createElement('div');
      grid.className = 'provider-grid';

      for (var i = 0; i < hosts.length; i++) {
        var h = hosts[i];
        var status = h.status || 'unknown';
        var isUp = status === 'online' || status === 'healthy';
        var isDown = status === 'down' || status === 'offline';
        var icon = isUp ? '\u2713' : (isDown ? '\u2717' : '\u26A0');
        var iconColor = isUp ? '#4ade80' : (isDown ? '#f87171' : '#fbbf24');
        var models = h.models_count != null ? h.models_count : (h.models ? h.models.length : 0);
        var running = h.running_tasks != null ? h.running_tasks : 0;

        var card = document.createElement('div');
        card.className = 'host-card';

        var header = document.createElement('div');
        header.className = 'host-header';
        var statusSpan = document.createElement('span');
        statusSpan.className = 'host-status';
        statusSpan.style.color = iconColor;
        statusSpan.textContent = icon;
        header.appendChild(statusSpan);
        var nameSpan = document.createElement('span');
        nameSpan.className = 'host-name';
        nameSpan.textContent = h.name || h.host || '?';
        header.appendChild(nameSpan);
        card.appendChild(header);

        var meta = document.createElement('div');
        meta.className = 'host-meta';
        meta.textContent = 'Status: ' + status;
        meta.appendChild(document.createElement('br'));
        meta.appendChild(document.createTextNode('Running: ' + running));
        meta.appendChild(document.createElement('br'));
        meta.appendChild(document.createTextNode('Models: ' + models));
        card.appendChild(meta);

        grid.appendChild(card);
      }
      el.appendChild(grid);
    }).catch(function(err) {
      setLoading(false);
      showError(el, 'Unable to load providers: ' + err.message, loadProviders);
    });
  }

  function loadWorkflow() {
    var el = document.getElementById('tab-workflow');
    setLoading(true);
    callTool('list_workflows').then(function(result) {
      setLoading(false);
      var data = extractData(result);
      if (!data) { showEmpty(el, 'No workflow data available'); return; }

      var workflows = data.workflows || [];
      var target = null;
      for (var i = 0; i < workflows.length; i++) {
        if (workflows[i].status === 'running' || workflows[i].status === 'active') { target = workflows[i]; break; }
      }
      if (!target && workflows.length > 0) target = workflows[0];
      if (!target) { showEmpty(el, 'No workflows found'); return; }

      setLoading(true);
      callTool('workflow_status', { workflow_id: target.id || target.workflow_id }).then(function(wfResult) {
        setLoading(false);
        var wf = extractData(wfResult);
        if (!wf) { showEmpty(el, 'Unable to load workflow details'); return; }
        cache.workflow = wf;

        el.textContent = '';

        var total = wf.total_tasks || wf.total || 0;
        var completed = wf.completed_tasks || wf.completed || 0;
        var pct = total > 0 ? Math.round(completed / total * 100) : 0;

        // Header
        var header = document.createElement('div');
        header.className = 'wf-header';
        var nameSpan = document.createElement('span');
        nameSpan.className = 'wf-name';
        nameSpan.textContent = wf.name || wf.workflow_name || target.name || 'Workflow';
        header.appendChild(nameSpan);
        var badgeSpan = document.createElement('span');
        var wfStatus = wf.status || target.status || 'unknown';
        var badgeCls = 'badge badge-gray';
        if (wfStatus === 'running' || wfStatus === 'active') badgeCls = 'badge badge-green';
        if (wfStatus === 'completed' || wfStatus === 'done') badgeCls = 'badge badge-blue';
        if (wfStatus === 'failed') badgeCls = 'badge badge-red';
        badgeSpan.className = badgeCls;
        badgeSpan.textContent = wfStatus;
        header.appendChild(badgeSpan);
        el.appendChild(header);

        // Progress bar
        var progSection = document.createElement('div');
        progSection.className = 'wf-progress';
        var barTrack = document.createElement('div');
        barTrack.className = 'wf-bar-track';
        var barFill = document.createElement('div');
        barFill.className = 'wf-bar-fill';
        barFill.style.width = pct + '%';
        barTrack.appendChild(barFill);
        progSection.appendChild(barTrack);
        var barLabel = document.createElement('div');
        barLabel.className = 'wf-bar-label';
        barLabel.textContent = completed + ' / ' + total + ' tasks (' + pct + '%)';
        progSection.appendChild(barLabel);
        el.appendChild(progSection);

        // Task nodes
        var nodes = wf.tasks || wf.nodes || [];
        if (nodes.length > 0) {
          el.appendChild(createSectionLabel('Task Nodes'));
          for (var i = 0; i < nodes.length; i++) {
            var n = nodes[i];
            var nStatus = n.status || 'pending';
            var nodeEl = document.createElement('div');
            nodeEl.className = 'wf-node';

            var dot = document.createElement('span');
            dot.className = 'status-dot ' + statusDotClass(nStatus);
            nodeEl.appendChild(dot);

            var nodeId = document.createElement('span');
            nodeId.className = 'wf-node-id';
            nodeId.textContent = n.node_id || n.id || n.task_id || ('node-' + i);
            nodeEl.appendChild(nodeId);

            var nodeBadge = document.createElement('span');
            var nCls = 'badge badge-gray';
            if (nStatus === 'running' || nStatus === 'active') nCls = 'badge badge-green';
            if (nStatus === 'completed' || nStatus === 'done') nCls = 'badge badge-blue';
            if (nStatus === 'failed') nCls = 'badge badge-red';
            if (nStatus === 'queued' || nStatus === 'pending') nCls = 'badge badge-yellow';
            nodeBadge.className = nCls;
            nodeBadge.textContent = nStatus;
            nodeEl.appendChild(nodeBadge);

            var nodeProv = document.createElement('span');
            nodeProv.className = 'wf-node-provider';
            nodeProv.textContent = n.provider || '\u2014';
            nodeEl.appendChild(nodeProv);

            el.appendChild(nodeEl);
          }
        }
      }).catch(function(err) {
        setLoading(false);
        showError(el, 'Unable to load workflow: ' + err.message, loadWorkflow);
      });
    }).catch(function(err) {
      setLoading(false);
      showError(el, 'Unable to load workflows: ' + err.message, loadWorkflow);
    });
  }

  function loadCost() {
    var el = document.getElementById('tab-cost');
    setLoading(true);
    Promise.all([
      callTool('get_cost_summary').catch(function() { return null; }),
      callTool('get_budget_status').catch(function() { return null; })
    ]).then(function(results) {
      setLoading(false);
      var costData = extractData(results[0]);
      var budgetData = extractData(results[1]);

      if (!costData && !budgetData) { showEmpty(el, 'No cost data available'); return; }
      cache.cost = { cost: costData, budget: budgetData };

      el.textContent = '';

      // Total spend
      var total = 0;
      if (costData && costData.total_cost != null) total = costData.total_cost;
      else if (costData && costData.total != null) total = costData.total;

      var totalSection = document.createElement('div');
      totalSection.className = 'cost-total';
      var amountEl = document.createElement('div');
      amountEl.className = 'cost-amount';
      amountEl.textContent = '$' + total.toFixed(4);
      totalSection.appendChild(amountEl);
      var totalLabel = document.createElement('div');
      totalLabel.className = 'cost-label';
      totalLabel.textContent = 'Total Spend';
      totalSection.appendChild(totalLabel);
      el.appendChild(totalSection);

      // Budget bar
      if (budgetData) {
        var budgetLimit = budgetData.budget_limit || budgetData.limit || 0;
        var budgetUsed = budgetData.budget_used || budgetData.used || total;
        var budgetPct = budgetLimit > 0 ? Math.min(Math.round(budgetUsed / budgetLimit * 100), 100) : 0;

        if (budgetLimit > 0) {
          var budgetSection = document.createElement('div');
          budgetSection.className = 'budget-section';

          var budgetLabel = document.createElement('div');
          budgetLabel.className = 'budget-label';
          var labelLeft = document.createElement('span');
          labelLeft.textContent = 'Budget';
          budgetLabel.appendChild(labelLeft);
          var labelRight = document.createElement('span');
          labelRight.textContent = budgetPct + '% used ($' + budgetUsed.toFixed(2) + ' / $' + budgetLimit.toFixed(2) + ')';
          budgetLabel.appendChild(labelRight);
          budgetSection.appendChild(budgetLabel);

          var bBarTrack = document.createElement('div');
          bBarTrack.className = 'budget-bar-track';
          var bBarFill = document.createElement('div');
          bBarFill.className = 'budget-bar-fill';
          bBarFill.style.width = budgetPct + '%';
          bBarFill.style.background = budgetColor(budgetPct);
          bBarTrack.appendChild(bBarFill);
          budgetSection.appendChild(bBarTrack);
          el.appendChild(budgetSection);
        }

        if (budgetData.warning) {
          var warnEl = document.createElement('div');
          warnEl.style.cssText = 'margin:8px 0;padding:6px 8px;background:#2d2305;border:1px solid #3d3310;border-radius:4px;font-size:11px;color:#fbbf24;';
          warnEl.textContent = '\u26A0 ' + budgetData.warning;
          el.appendChild(warnEl);
        }
      }

      // Provider breakdown
      var providers = costData ? (costData.by_provider || costData.providers || costData.breakdown || []) : [];
      if (providers && (Array.isArray(providers) ? providers.length > 0 : Object.keys(providers).length > 0)) {
        var breakdownSection = document.createElement('div');
        breakdownSection.className = 'cost-breakdown';
        breakdownSection.appendChild(createSectionLabel('By Provider'));

        if (Array.isArray(providers)) {
          for (var i = 0; i < providers.length; i++) {
            var p = providers[i];
            var pName = p.provider || p.name || 'unknown';
            var pCost = p.cost != null ? p.cost : (p.total != null ? p.total : 0);
            var row = document.createElement('div');
            row.className = 'cost-row';
            var provSpan = document.createElement('span');
            provSpan.className = 'cost-provider';
            provSpan.textContent = pName;
            row.appendChild(provSpan);
            var valSpan = document.createElement('span');
            valSpan.className = 'cost-value';
            valSpan.textContent = '$' + pCost.toFixed(4);
            row.appendChild(valSpan);
            breakdownSection.appendChild(row);
          }
        } else {
          var keys = Object.keys(providers);
          for (var k = 0; k < keys.length; k++) {
            var val = typeof providers[keys[k]] === 'number' ? providers[keys[k]] : (providers[keys[k]].cost || 0);
            var oRow = document.createElement('div');
            oRow.className = 'cost-row';
            var oProv = document.createElement('span');
            oProv.className = 'cost-provider';
            oProv.textContent = keys[k];
            oRow.appendChild(oProv);
            var oVal = document.createElement('span');
            oVal.className = 'cost-value';
            oVal.textContent = '$' + val.toFixed(4);
            oRow.appendChild(oVal);
            breakdownSection.appendChild(oRow);
          }
        }
        el.appendChild(breakdownSection);
      }
    }).catch(function(err) {
      setLoading(false);
      showError(el, 'Unable to load cost data: ' + err.message, loadCost);
    });
  }

  // --- Tab Switching ---
  var loaders = { tasks: loadTasks, providers: loadProviders, workflow: loadWorkflow, cost: loadCost };

  function switchTab(name) {
    activeTab = name;
    var btns = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('active', btns[i].getAttribute('data-tab') === name);
    }
    var panes = document.querySelectorAll('.tab-content');
    for (var j = 0; j < panes.length; j++) {
      panes[j].classList.toggle('active', panes[j].id === 'tab-' + name);
    }
    if (loaders[name]) loaders[name]();
    resetRefresh();
  }

  document.getElementById('tabs').addEventListener('click', function(e) {
    if (e.target.classList.contains('tab-btn')) {
      switchTab(e.target.getAttribute('data-tab'));
    }
  });

  // --- Auto-refresh ---
  function resetRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(function() {
      if (loaders[activeTab]) loaders[activeTab]();
    }, 10000);
  }

  // --- Init ---
  var params = new URLSearchParams(window.location.search);
  var initTab = params.get('tab');
  if (initTab && loaders[initTab]) {
    switchTab(initTab);
  } else {
    switchTab('tasks');
  }
})();
</script>
</body>
</html>
