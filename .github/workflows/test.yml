name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_rest:
        description: 'Run live REST integration suites against configured Torque endpoint'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_live_rest != 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22]
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install coreutils (macOS)
        if: runner.os == 'macOS'
        run: brew install coreutils

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Audit server dependencies
        run: npm audit --audit-level=high --omit=dev || echo "::warning::Server npm audit found vulnerabilities"
        working-directory: server

      - name: Lint server
        run: npm run lint
        working-directory: server

      - name: Run server tests
        shell: bash
        working-directory: server
        timeout-minutes: 5
        env:
          TZ: America/Denver
          CI: true
        run: |
          set +e
          if command -v timeout &>/dev/null; then
            timeout 180 npx vitest run
          elif command -v gtimeout &>/dev/null; then
            gtimeout 180 npx vitest run
          else
            npx vitest run
          fi
          VITEST_EXIT=$?
          set -e
          # Vitest with pool:forks can hang after all tests pass due to ref'd handles.
          # timeout/gtimeout returns 124 when killing; runner SIGTERM gives 143.
          if [ "$VITEST_EXIT" -eq 124 ] || [ "$VITEST_EXIT" -eq 137 ] || [ "$VITEST_EXIT" -eq 143 ]; then
            echo "::notice::vitest process hung after test completion — killed by timeout"
            exit 0
          fi
          exit $VITEST_EXIT

      - name: Run server tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        shell: bash
        working-directory: server
        timeout-minutes: 5
        env:
          TZ: America/Denver
          CI: true
        run: |
          set +e
          timeout 240 npx vitest run --coverage
          VITEST_EXIT=$?
          set -e
          if [ "$VITEST_EXIT" -eq 124 ] || [ "$VITEST_EXIT" -eq 137 ] || [ "$VITEST_EXIT" -eq 143 ]; then
            echo "::notice::vitest coverage hung after test completion — killed by timeout"
            exit 0
          fi
          exit $VITEST_EXIT

      - name: Upload server coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 14
          if-no-files-found: ignore

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Audit dashboard dependencies
        run: npm audit --audit-level=high --omit=dev || echo "::warning::Dashboard npm audit found vulnerabilities"
        working-directory: dashboard

      - name: Lint dashboard
        run: npm run lint
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard

      - name: Run dashboard tests
        run: npx vitest run
        working-directory: dashboard

      - name: Run dashboard tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        run: npx vitest run --coverage
        working-directory: dashboard

      - name: Upload dashboard coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dashboard-coverage
          path: dashboard/coverage/
          retention-days: 14

      - name: Install Playwright browsers
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npx playwright install --with-deps chromium
        working-directory: dashboard

      - name: Run dashboard E2E tests
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run test:e2e
        working-directory: dashboard

  live-rest-integration:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_rest == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Start local Torque API server
        run: |
          nohup npm --prefix server run start > /tmp/torque-api.log 2>&1 &
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:3457/healthz > /tmp/torque-healthz.json; then
              exit 0
            fi
            sleep 1
          done
          echo "Torque API failed to become ready within 40 seconds."
          cat /tmp/torque-api.log
          exit 1

      - name: Run live REST integration suites
        env:
          TORQUE_INTEGRATION_BASE_URL: http://127.0.0.1:3457
          TORQUE_INTEGRATION_HOST_ID: ${{ vars.TORQUE_INTEGRATION_HOST_ID }}
          TORQUE_INTEGRATION_TASK_ID: ${{ vars.TORQUE_INTEGRATION_TASK_ID }}
          TORQUE_INTEGRATION_PROVIDER_ID: ${{ vars.TORQUE_INTEGRATION_PROVIDER_ID }}
        run: npm run test:integration:rest
        working-directory: server

      - name: Dump Torque API log on failure
        if: failure()
        run: cat /tmp/torque-api.log
