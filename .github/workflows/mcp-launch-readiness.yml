name: MCP Launch Readiness
permissions:
  contents: read
  actions: write

on:
  push:
    branches: [main]
    paths:
      - 'server/mcp/**'
      - 'server/scripts/mcp-*.js'
      - 'server/package.json'
      - '.github/workflows/mcp-launch-readiness.yml'
  pull_request:
    paths:
      - 'server/mcp/**'
      - 'server/scripts/mcp-*.js'
      - 'server/package.json'
      - '.github/workflows/mcp-launch-readiness.yml'
  workflow_dispatch:

jobs:
  launch-readiness:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-mcp-readiness') }}
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 24
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 24

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run MCP launch readiness smoke
        working-directory: server
        shell: pwsh
        run: |
          $env:TORQUE_CLEAN_MCP_PORTS = '1'
          $env:TORQUE_MCP_LAUNCH_REPORT = "artifacts/mcp/launch-readiness-${{ github.run_id }}.json"
          npm run ci:mcp-launch-readiness

      - name: Upload MCP launch readiness report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: mcp-launch-readiness-${{ github.run_id }}
          path: server/artifacts/mcp/launch-readiness-${{ github.run_id }}.json
          retention-days: 14
