name: Bug Report
description: Report a bug in TORQUE
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
  - type: input
    attributes:
      label: TORQUE version
      description: "Output of torque --version"
  - type: dropdown
    attributes:
      label: Installation method
      options:
        - npm
        - Docker
        - From source
  - type: dropdown
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
  - type: textarea
    attributes:
      label: Relevant logs
      description: Paste any error output or logs
      render: shell
